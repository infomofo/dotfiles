set-option -g default-shell /bin/zsh

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Update default binding of `Enter` to also use copy-pipe
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Bind prefix + ']' to paste from system clipboard
bind ] run-shell "pbpaste | tmux load-buffer - && tmux paste-buffer"

set -g focus-events on
set -g status-interval 1

# Auto-label tabs with emoji for known commands, "command:dir" for the rest.
# Claude Code sets process.title to its semver → 🤖 (always matched first).
# Edit the map= line below to add more command→emoji mappings.
# Claude hooks override per-window to swap emoji for status.
set-option -g automatic-rename on
run-shell '\
  map="zsh=🐚 copilot=😺"; \
  H="#"; \
  pc="${H}{pane_current_command}"; \
  dp="${H}{b:pane_current_path}"; \
  fmt="${pc}:${dp}"; \
  for entry in $map; do \
    cmd="${entry%%=*}"; emoji="${entry#*=}"; \
    fmt="${H}{?${H}{==:${pc},${cmd}},${emoji} ${dp},${fmt}}"; \
  done; \
  fmt="${H}{?${H}{m:[0-9]*.[0-9]*.[0-9]*,${pc}},🤖 ${dp},${fmt}}"; \
  tmux set-option -g automatic-rename-format "$fmt" \
'
set-option -g allow-rename off
set -g status-right ' #{pane_title} '
set -g default-terminal "screen-256color"
